services:
  timer_web_app:
    build:
      context: .
      dockerfile: Dockerfile
  postgres:
    image: postgres:17-alpine          # или postgres:16, 15 — что тебе ближе
    restart: always
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: devpass123
      POSTGRES_DB:       timerdemo
    ports:
      - "5433:5432"                    # 5433 на хосте → чтобы не конфликтовал с локальным postgres, если есть
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"                    # 6380 на хосте
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
